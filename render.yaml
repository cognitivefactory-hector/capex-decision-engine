# Render Blueprint — deploys the Dockerized Django app.
# Create from the Render dashboard: New → Blueprint → point at this repo.
# Set ANTHROPIC_API_KEY in the dashboard (sync:false keeps it out of git).
services:
  - type: web
    name: capex-decision-engine
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: starter
    healthCheckPath: /healthz/
    autoDeploy: true
    envVars:
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_SECRET_KEY
        generateValue: true          # Render generates a strong secret
      - key: DJANGO_ALLOWED_HOSTS
        # Add capex.hector-garza.com once the subdomain is wired through Cloudflare.
        value: ".onrender.com,capex.hector-garza.com"
      - key: DJANGO_CSRF_TRUSTED_ORIGINS
        # Wildcard covers the Render-assigned subdomain; add the custom domain too.
        value: "https://*.onrender.com,https://capex.hector-garza.com"
      - key: MEMO_MODEL
        value: "claude-sonnet-4-6"
      - key: ANTHROPIC_API_KEY
        sync: false                  # set in the Render dashboard; never committed
